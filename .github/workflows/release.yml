name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts without publishing a GitHub Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check README download links match package version
        run: pnpm sync:readme:check

      - name: Quality gates
        run: |
          pnpm run format:check
          pnpm run lint
          pnpm run typecheck
          pnpm run test

      - name: Build app (macOS)
        if: matrix.platform == 'mac'
        run: pnpm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build app (Windows)
        if: matrix.platform == 'win'
        run: pnpm run build:win

      - name: Build app (Linux)
        if: matrix.platform == 'linux'
        run: pnpm run build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neko-${{ matrix.platform }}-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*-setup.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.dry_run == 'false')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p upload
          find release-assets -type f -exec cp {} upload/ \;
          ls -lah upload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
